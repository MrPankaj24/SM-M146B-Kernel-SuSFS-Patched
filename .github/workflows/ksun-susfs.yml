name: 🏗️ Build Native SuSFS Kernel (Samsung M14)

on:
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout Patched Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
          git curl wget bc bison flex libssl-dev libelf-dev python3 make gcc-aarch64-linux-gnu clang lld llvm zip

      - name: 🔧 Setup Toolchain (AOSP Clang)
        run: |
          mkdir -p toolchain
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz" -o clang.tar.gz
          tar -xzf clang.tar.gz -C toolchain && rm clang.tar.gz

      - name: 🛡️ Integrate SukiSU
        run: |
          cd SM-M146B-Kernel-Source
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          echo "✅ KernelSU integrated into natively patched source"

      - name: 🔨 Compile Patched Kernel
        run: |
          export PATH=$(pwd)/toolchain/bin:$PATH
          cd SM-M146B-Kernel-Source
          
          # Generate config
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- s5e8535-m14xnsxx_defconfig
          
          # Enable SuSFS & KSU in .config
          ./scripts/config --file out/.config --enable CONFIG_KSU
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_MAP
          
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: M14-Native-SuSFS-Kernel
          path: SM-M146B-Kernel-Source/out/arch/arm64/boot/Image
